apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev-configuration
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: default
  source:
    repoURL: https://github.com/TUNAS106/yas-gitops.git
    targetRevision: main
    path: charts/yas-configuration
    helm:
      releaseName: yas-configuration
      values: |
        applicationConfig:
          spring:
            security:
              oauth2:
                resourceserver:
                  jwt:
                    issuer-uri: http://identity.yas.local.com/realms/Yas
          springdoc:
            oauthflow:
              authorization-url: http://identity.yas.local.com/realms/Yas/protocol/openid-connect/auth
              token-url: http://identity.yas.local.com/realms/Yas/protocol/openid-connect/token
        mediaApplicationConfig:
          yas:
            publicUrl: http://api-dev.yas.local.com/media
        paymentPaypalApplicationConfig:
          yas:
            public:
              url: http://storefront-dev.yas.local.com/complete-payment
  destination:
    server: https://kubernetes.default.svc
    namespace: yas-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev-storefront-bff
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/TUNAS106/yas-gitops.git
    targetRevision: main
    path: charts/storefront-bff
    helm:
      releaseName: storefront-bff
      parameters:
        - name: backend.image.tag
          value: main
        - name: backend.ingress.host
          value: storefront-dev.yas.local.com
        - name: backend.ingress.path
          value: /
        - name: backend.serviceMonitor.enabled
          value: "false"
  destination:
    server: https://kubernetes.default.svc
    namespace: yas-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev-storefront-ui
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/TUNAS106/yas-gitops.git
    targetRevision: main
    path: charts/storefront-ui
    helm:
      releaseName: storefront-ui
      parameters:
        - name: ui.image.tag
          value: main
        - name: ui.extraEnvs[0].name
          value: API_BASE_PATH
        - name: ui.extraEnvs[0].value
          value: http://storefront-dev.yas.local.com/api
  destination:
    server: https://kubernetes.default.svc
    namespace: yas-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
