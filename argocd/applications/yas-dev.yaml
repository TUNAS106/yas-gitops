apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/TUNAS106/yas-gitops.git
      targetRevision: main
      path: charts/yas-configuration
      helm:
        releaseName: yas-configuration
        values: |
          applicationConfig:
            spring:
              security:
                oauth2:
                  resourceserver:
                    jwt:
                      issuer-uri: http://identity.yas.local.com/realms/Yas
            springdoc:
              oauthflow:
                authorization-url: http://identity.yas.local.com/realms/Yas/protocol/openid-connect/auth
                token-url: http://identity.yas.local.com/realms/Yas/protocol/openid-connect/token
          mediaApplicationConfig:
            yas:
              publicUrl: http://api-dev.yas.local.com/media
          paymentPaypalApplicationConfig:
            yas:
              public:
                url: http://storefront-dev.yas.local.com/complete-payment

    - repoURL: https://github.com/TUNAS106/yas-gitops.git
      targetRevision: main
      path: charts/storefront-bff
      helm:
        releaseName: storefront-bff
        parameters:
          - name: backend.image.tag
            value: latest
          - name: backend.ingress.host
            value: storefront-dev.yas.local.com
          - name: backend.ingress.path
            value: /
          - name: backend.serviceMonitor.enabled
            value: "false"

    - repoURL: https://github.com/TUNAS106/yas-gitops.git
      targetRevision: main
      path: charts/storefront-ui
      helm:
        releaseName: storefront-ui
        parameters:
          - name: ui.image.tag
            value: latest
          - name: ui.extraEnvs[0].name
            value: API_BASE_PATH
          - name: ui.extraEnvs[0].value
            value: http://storefront-dev.yas.local.com/api

    - repoURL: https://github.com/TUNAS106/yas-gitops.git
      targetRevision: main
      path: charts/swagger-ui
      helm:
        releaseName: swagger-ui
        values: |
          ingress:
            host: api-dev.yas.local.com
            hosts:
              - host: api-dev.yas.local.com
                paths:
                  - path: /swagger-ui
                    pathType: ImplementationSpecific

    - repoURL: https://github.com/TUNAS106/yas-gitops.git
      targetRevision: main
      path: charts/cart
      helm:
        releaseName: cart
        parameters:
          - name: backend.image.tag
            value: latest
          - name: backend.ingress.enabled
            value: "true"
          - name: backend.ingress.host
            value: api-dev.yas.local.com
          - name: backend.ingress.path
            value: /cart
          - name: backend.serviceMonitor.enabled
            value: "false"

    - repoURL: https://github.com/TUNAS106/yas-gitops.git
      targetRevision: main
      path: charts/customer
      helm:
        releaseName: customer
        parameters:
          - name: backend.image.tag
            value: latest
          - name: backend.ingress.enabled
            value: "true"
          - name: backend.ingress.host
            value: api-dev.yas.local.com
          - name: backend.ingress.path
            value: /customer
          - name: backend.serviceMonitor.enabled
            value: "false"

    - repoURL: https://github.com/TUNAS106/yas-gitops.git
      targetRevision: main
      path: charts/product
      helm:
        releaseName: product
        parameters:
          - name: backend.image.tag
            value: latest
          - name: backend.ingress.enabled
            value: "true"
          - name: backend.ingress.host
            value: api-dev.yas.local.com
          - name: backend.ingress.path
            value: /product
          - name: backend.serviceMonitor.enabled
            value: "false"

    - repoURL: https://github.com/TUNAS106/yas-gitops.git
      targetRevision: main
      path: charts/tax
      helm:
        releaseName: tax
        parameters:
          - name: backend.image.tag
            value: latest
          - name: backend.ingress.enabled
            value: "true"
          - name: backend.ingress.host
            value: api-dev.yas.local.com
          - name: backend.ingress.path
            value: /tax
          - name: backend.serviceMonitor.enabled
            value: "false"

